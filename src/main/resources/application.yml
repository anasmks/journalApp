spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
      database: ${MONGODB_DATABASE}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}

weather_api_key: ${WEATHER_API_KEY}